services:
  lab-flux:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: lab-flux-container
    ports:
      - "8082:8082"
      - "5005:5005" # 讓 IntelliJ 也能從外面連進來
    networks:
      - monitoring-net

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - monitoring-net

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - monitoring-net

networks:
  monitoring-net:
    driver: bridge