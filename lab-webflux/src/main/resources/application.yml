server:
  address: 0.0.0.0
  port: 8082
spring:
  application:
    name: concurrency-lab # 建議兩邊標籤一致，用 instance 去拆分，或者你喜歡分開叫也行
  r2dbc:
    # 指向 docker-compose 裡的 db 服務
    url: r2dbc:postgresql://db:5432/lab_db
    username: user
    password: password
    pool:
      initial-size: 5
      max-size: 5 # 關鍵！故意設小，模擬高負載下的連線競爭
      max-create-connection-time: 2s
  data:
    redis:
      host: redis-lab  # 👈 關鍵！不能寫 localhost，要寫服務名稱
      port: 6379

# 監控設定保持不變，這部分你已經改得很完美了
management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,info,metrics
  metrics:
    tags:
      application: ${spring.application.name}

resilience4j:
  circuitbreaker:
    instances:
      dbBreaker:
        # 當失敗率達到 50% 時，開啟斷路器
        failure-rate-threshold: 50
        # 統計失敗率的滑動窗口大小（紀錄最近 10 次呼叫）
        sliding-window-size: 10
        # 斷路器開啟後，等待 10 秒再嘗試進入半開狀態
        wait-duration-in-open-state: 10s
        # 允許在健康檢查指標中顯示
        register-health-indicator: true
        # 自動從開啟切換到半開，不需人工干預
        automatic-transition-from-open-to-half-open-enabled: true

  timelimiter:
    instances:
      dbBreaker:
        # 硬性規定：任何 DB 查詢超過 2 秒直接視為失敗（防止執行緒被卡死）
        timeout-duration: 2s